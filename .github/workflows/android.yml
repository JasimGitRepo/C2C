name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================================================
      # --- TDLIB COMPILATION & CACHING ENGINE ---
      # =========================================================

      # 1. Check if we already compiled TDLib in a previous run
      - name: Cache TDLib Build (Saves 25 minutes on future builds)
        id: cache-tdlib
        uses: actions/cache@v4
        with:
          path: td-prebuilt
          key: tdlib-arm64-v2

      # 2. Setup Swap Space using /swapfile2 to avoid OS filesystem locks
      - name: Set up Swap Space
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        run: |
          sudo dd if=/dev/zero of=/swapfile2 bs=1M count=10240
          sudo chmod 600 /swapfile2
          sudo mkswap /swapfile2
          sudo swapon /swapfile2
          free -h

      - name: Install TDLib Build Dependencies
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y make git zlib1g-dev libssl-dev gperf php-cli cmake clang libc++-dev libc++abi-dev

      # 3. Cross-Compile OpenSSL for Android Statically (Fixes the missing Crypto error)
      - name: Build OpenSSL for Android (Static)
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        run: |
          export ANDROID_NDK_ROOT=$ANDROID_NDK_LATEST_HOME
          export PATH=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
          
          wget https://github.com/openssl/openssl/releases/download/openssl-3.1.5/openssl-3.1.5.tar.gz
          tar -xzf openssl-3.1.5.tar.gz
          cd openssl-3.1.5
          
          # 'no-shared' ensures OpenSSL compiles statically so it can be absorbed into libtdjni.so
          ./Configure android-arm64 no-shared -D__ANDROID_API__=30 --prefix=$GITHUB_WORKSPACE/openssl-prebuilt
          make -j$(nproc)
          make install_sw

      # 4. Compile TDLib using the statically built OpenSSL
      - name: Download and Compile TDLib
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/tdlib/td.git
          cd td
          mkdir build-arm64
          cd build-arm64
          
          cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=arm64-v8a \
                -DANDROID_PLATFORM=android-30 \
                -DCMAKE_BUILD_TYPE=Release \
                -DOPENSSL_ROOT_DIR=$GITHUB_WORKSPACE/openssl-prebuilt \
                -DOPENSSL_USE_STATIC_LIBS=TRUE \
                -DTD_ENABLE_JNI=ON \
                ..
          
          # Compile the JNI Library
          cmake --build . --target tdjni -- -j$(nproc)
          
          # Move the compiled files into a clean directory for caching
          cd ../..
          mkdir -p td-prebuilt/libs
          mkdir -p td-prebuilt/java/org/drinkless/tdlib
          
          find td/build-arm64 -name "libtdjni.so" -exec cp {} td-prebuilt/libs/ \;
          find td -name "*.java" | grep "org/drinkless/tdlib" | xargs -I {} cp {} td-prebuilt/java/org/drinkless/tdlib/

      # 5. Inject the compiled/cached files into your Android Project tree
      - name: Inject Compiled TDLib into Android Project
        run: |
          # Copy the .so C++ library
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp td-prebuilt/libs/libtdjni.so app/src/main/jniLibs/arm64-v8a/
          
          # Copy the generated TdApi.java and Client.java files
          mkdir -p app/src/main/java/org/drinkless/tdlib
          cp td-prebuilt/java/org/drinkless/tdlib/*.java app/src/main/java/org/drinkless/tdlib/
          
          # Strip out the fake maven dependency so Gradle doesn't crash looking for it
          sed -i 's/implementation("org.drinkless.tdlib:tdlib:1.8.0")//g' app/build.gradle.kts

      # =========================================================
      # --- STANDARD ANDROID BUILD STEPS ---
      # =========================================================

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install & Setup Gradle Globally
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7' 

      - name: Build Debug APK with System Gradle
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk