name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================================================
      # 1. SETUP JAVA 
      # =========================================================
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # =========================================================
      # --- TDLIB OFFICIAL BASH COMPILATION & EXPLICIT CACHING ---
      # =========================================================

      # RESTORE: Check if the cache already exists at the start of the workflow
      - name: Restore Official TDLib Build
        id: cache-tdlib-restore
        uses: actions/cache/restore@v4
        with:
          path: td-prebuilt
          key: tdlib-official-bash-v2

      - name: Set up Swap Space (Prevents OOM during NDK build)
        if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
        run: |
          sudo dd if=/dev/zero of=/swapfile2 bs=1M count=8192
          sudo chmod 600 /swapfile2
          sudo mkswap /swapfile2
          sudo swapon /swapfile2

      - name: Install TDLib Build Dependencies
        if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y make git zlib1g-dev libssl-dev gperf php-cli cmake clang perl

      - name: Build Official TDLib via Telegram Bash Scripts
        if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/tdlib/td.git
          cd td/example/android
          
          # 1. Check environment and install isolated Android SDK 
          ./check-environment.sh
          ./fetch-sdk.sh
          
          # 2. Build OpenSSL and TDLib natively using Telegram's exact scripts
          ./build-openssl.sh
          ./build-tdlib.sh
          
          # 3. Collect the compiled JNI artifacts and generated Java files
          cd ../../..
          mkdir -p td-prebuilt/libs
          mkdir -p td-prebuilt/java
          
          # The bash script drops the artifacts neatly into tdlib/libs and tdlib/java
          cp -R td/example/android/tdlib/libs/* td-prebuilt/libs/
          cp -R td/example/android/tdlib/java/* td-prebuilt/java/

      # SAVE: Upload the cache IMMEDIATELY after compilation. 
      # If the Android build fails later, this 1.5 hour work is still safely saved!
      - name: Save Official TDLib Build to Cache
        if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: td-prebuilt
          key: tdlib-official-bash-v2

      # =========================================================
      # --- INJECT INTO ANDROID & BUILD APK ---
      # =========================================================

      - name: Inject Compiled TDLib into Android Project
        run: |
          # 1. Copy the architecture .so libraries into jniLibs
          mkdir -p app/src/main/jniLibs
          cp -R td-prebuilt/libs/* app/src/main/jniLibs/
          
          # 2. Copy the generated Java classes into the source tree
          mkdir -p app/src/main/java
          cp -R td-prebuilt/java/* app/src/main/java/
          
          # 3. Strip out the fake maven dependency safely
          sed -i 's/implementation("org.drinkless.tdlib:tdlib:1.8.0")//g' app/build.gradle.kts || true

      - name: Install & Setup Gradle Globally
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7' 

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk