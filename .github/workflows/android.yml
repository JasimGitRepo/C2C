name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================================================
      # 1. SETUP JAVA 17 (Required by modern Android Gradle Plugin)
      # =========================================================
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # =========================================================
      # --- TDLIB OFFICIAL AAR COMPILATION & CACHING ---
      # =========================================================

      - name: Cache Official TDLib AAR
        id: cache-tdlib
        uses: actions/cache@v4
        with:
          path: td-prebuilt
          key: tdlib-official-aar-arm64-v2 # Bumped to v2 for clean hardened build

      - name: Set up Swap Space (Prevents OOM during NDK build)
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        run: |
          sudo dd if=/dev/zero of=/swapfile2 bs=1M count=8192
          sudo chmod 600 /swapfile2
          sudo mkswap /swapfile2
          sudo swapon /swapfile2
          free -h

      - name: Build Official TDLib AAR
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        run: |
          # 1. Clone official Telegram TDLib
          git clone https://github.com/tdlib/td.git
          cd td/example/android
          
          # 2. GUARANTEE PATHS: Write local.properties so Gradle finds the exact SDK/NDK
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_NDK_LATEST_HOME" >> local.properties
          
          # 3. OPTIMIZATION: Force the script to ONLY build arm64-v8a (Cuts 2 hours to 15 mins)
          sed -i -E 's/abiFilters.*/abiFilters "arm64-v8a"/g' tdlib/build.gradle
          
          # 4. ERROR-PROOF COMPILATION: Use strict memory limits and disable daemon to prevent CI crashes
          chmod +x gradlew
          ./gradlew :tdlib:assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=4g"
          
          # 5. Extract the finalized .aar file
          cd ../../..
          mkdir -p td-prebuilt
          cp td/example/android/tdlib/build/outputs/aar/tdlib-release.aar td-prebuilt/

      # =========================================================
      # --- INJECT INTO ANDROID & BUILD APK ---
      # =========================================================

      - name: Inject TDLib AAR into Project
        run: |
          # Place the compiled AAR file safely into your app's libs folder
          mkdir -p app/libs
          cp td-prebuilt/tdlib-release.aar app/libs/
          
          # Automatically swap the Maven implementation for our locally compiled AAR
          sed -i 's/implementation("org.drinkless.tdlib:tdlib:1.8.0")/implementation(files("libs\/tdlib-release.aar"))/g' app/build.gradle.kts

      - name: Install & Setup Gradle Globally
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7' 

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk