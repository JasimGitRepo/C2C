name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================================================
      # 1. MOVED TO TOP: Java is strictly required by TDLib's script
      # =========================================================
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # =========================================================
      # --- TDLIB COMPILATION & CACHING ENGINE ---
      # =========================================================

      - name: Cache TDLib Build
        id: cache-tdlib
        uses: actions/cache@v4
        with:
          path: td-prebuilt
          key: tdlib-arm64-v5

      - name: Set up Swap Space
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        run: |
          sudo dd if=/dev/zero of=/swapfile2 bs=1M count=10240
          sudo chmod 600 /swapfile2
          sudo mkswap /swapfile2
          sudo swapon /swapfile2
          free -h

      - name: Install TDLib Build Dependencies
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y make git zlib1g-dev libssl-dev gperf php-cli cmake clang libc++-dev libc++abi-dev

      - name: Download and Compile TDLib (via Official Script)
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/tdlib/td.git
          cd td/example/android
          
          # Force build.sh to only compile for arm64-v8a to save CI time
          # This safely removes 32-bit and x86 ABIs from the build loop
          sed -i -e 's/armeabi-v7a//g' -e 's/x86_64//g' -e 's/x86//g' build.sh
          
          # Run the official TDLib Android build script with our NDK path
          ./build.sh $ANDROID_NDK_LATEST_HOME
          
          # Copy out the compiled artifacts for caching
          cd ../../..
          mkdir -p td-prebuilt/libs
          mkdir -p td-prebuilt/java/org/drinkless/tdlib
          
          # Automatically find where the script dropped the .so and .java files and cache them
          find td/example/android -name "libtdjni.so" -exec cp {} td-prebuilt/libs/ \;
          find td/example/android -name "*.java" | grep "org/drinkless/tdlib" | xargs -I {} cp {} td-prebuilt/java/org/drinkless/tdlib/

      # =========================================================
      # --- INJECT INTO ANDROID & BUILD APK ---
      # =========================================================

      - name: Inject Compiled TDLib into Android Project
        run: |
          # Copy the .so C++ library
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp td-prebuilt/libs/libtdjni.so app/src/main/jniLibs/arm64-v8a/
          
          # Copy the generated TdApi.java and Client.java files
          mkdir -p app/src/main/java/org/drinkless/tdlib
          cp td-prebuilt/java/org/drinkless/tdlib/*.java app/src/main/java/org/drinkless/tdlib/
          
          # Strip out the fake maven dependency so Gradle doesn't crash looking for it
          sed -i 's/implementation("org.drinkless.tdlib:tdlib:1.8.0")//g' app/build.gradle.kts

      - name: Install & Setup Gradle Globally
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7' 

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk