name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================================================
      # 1. MOVED TO TOP: CMake MUST have Java to generate 'tdjni'
      # =========================================================
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # =========================================================
      # --- TDLIB COMPILATION & CACHING ENGINE ---
      # =========================================================

      - name: Cache TDLib Build
        id: cache-tdlib
        uses: actions/cache@v4
        with:
          path: td-prebuilt
          key: tdlib-arm64-v6

      - name: Set up Swap Space
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        run: |
          sudo dd if=/dev/zero of=/swapfile2 bs=1M count=10240
          sudo chmod 600 /swapfile2
          sudo mkswap /swapfile2
          sudo swapon /swapfile2
          free -h

      - name: Install TDLib Build Dependencies
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y make git zlib1g-dev libssl-dev gperf php-cli cmake clang libc++-dev libc++abi-dev

      - name: Build OpenSSL for Android (Static)
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        run: |
          export ANDROID_NDK_ROOT=$ANDROID_NDK_LATEST_HOME
          export PATH=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
          
          wget https://github.com/openssl/openssl/releases/download/openssl-3.1.5/openssl-3.1.5.tar.gz
          tar -xzf openssl-3.1.5.tar.gz
          cd openssl-3.1.5
          
          ./Configure android-arm64 no-shared -fPIC -D__ANDROID_API__=30 --prefix=$GITHUB_WORKSPACE/openssl-prebuilt --libdir=lib
          make -j$(nproc)
          make install_sw

      - name: Download and Compile TDLib
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/tdlib/td.git
          cd td
          
          # ---------------------------------------------------------
          # 1. BUILD HOST TOOLS (Directory MUST be named 'build')
          # We MUST pass -DTD_ENABLE_JNI=ON here so it builds generate_java_api
          # ---------------------------------------------------------
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DTD_ENABLE_JNI=ON ..
          cmake --build . --target prepare_cross_compiling
          cd ..
          
          # ---------------------------------------------------------
          # 2. CROSS-COMPILE ANDROID TARGET (arm64-v8a)
          # ---------------------------------------------------------
          mkdir build-arm64
          cd build-arm64
          
          cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=arm64-v8a \
                -DANDROID_PLATFORM=android-30 \
                -DCMAKE_BUILD_TYPE=Release \
                -DOPENSSL_INCLUDE_DIR=$GITHUB_WORKSPACE/openssl-prebuilt/include \
                -DOPENSSL_CRYPTO_LIBRARY=$GITHUB_WORKSPACE/openssl-prebuilt/lib/libcrypto.a \
                -DOPENSSL_SSL_LIBRARY=$GITHUB_WORKSPACE/openssl-prebuilt/lib/libssl.a \
                -DTD_ENABLE_JNI=ON \
                ..
          
          # This will now succeed because 'generate_java_api' exists in ../build
          cmake --build . --target tdjni -- -j$(nproc)
          
          # ---------------------------------------------------------
          # 3. EXTRACT COMPILED ARTIFACTS
          # ---------------------------------------------------------
          cd ../..
          mkdir -p td-prebuilt/libs
          mkdir -p td-prebuilt/java/org/drinkless/tdlib
          
          cp td/build-arm64/libtdjni.so td-prebuilt/libs/
          find td -name "*.java" | grep "org/drinkless/tdlib" | xargs -I {} cp {} td-prebuilt/java/org/drinkless/tdlib/

      # =========================================================
      # --- INJECT INTO ANDROID & BUILD APK ---
      # =========================================================

      - name: Inject Compiled TDLib into Android Project
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp td-prebuilt/libs/libtdjni.so app/src/main/jniLibs/arm64-v8a/
          
          mkdir -p app/src/main/java/org/drinkless/tdlib
          cp td-prebuilt/java/org/drinkless/tdlib/*.java app/src/main/java/org/drinkless/tdlib/
          
          sed -i 's/implementation("org.drinkless.tdlib:tdlib:1.8.0")//g' app/build.gradle.kts

      - name: Install & Setup Gradle Globally
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7' 

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk